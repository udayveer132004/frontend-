<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mock Interview Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 420px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 600px;
    }

    .chat-header {
      background: #2c3e50;
      color: #fff;
      padding: 16px 20px;
    }

    .chat-header h2 { font-size: 16px; font-weight: 600; }
    .chat-header p  { font-size: 12px; color: #aab; margin-top: 2px; }

    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.bot {
      background: #f0f2f5;
      color: #222;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.user {
      background: #2c3e50;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .chat-input {
      display: flex;
      padding: 12px;
      border-top: 1px solid #eee;
      gap: 8px;
    }

    .chat-input input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
    }

    .chat-input input:focus { border-color: #2c3e50; }

    .chat-input button {
      background: #2c3e50;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-input button:hover { background: #3d5166; }

    .status {
      font-size: 11px;
      color: #888;
      text-align: center;
      padding: 4px 0 8px;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <h2>🎙️ Mock Interview Assistant</h2>
    <p>Practice your interview skills with AI</p>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="message bot">
      👋 Hi! I'm your mock interview assistant. What role are you interviewing for?
    </div>
  </div>

  <p class="status" id="status">Interviewer is ready</p>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type your answer..." />
    <button onclick="sendMessage()">&#9658;</button>
  </div>
</div>

<script>
  const responses = [
    "Great! Tell me about yourself and your background.",
    "Interesting. What's your greatest strength relevant to this role?",
    "Can you describe a challenging project you've worked on?",
    "How do you handle tight deadlines or pressure?",
    "Where do you see yourself in 5 years?",
    "Do you have any questions for me?"
  ];

  let step = 0;

  document.getElementById("userInput").addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });

  function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    document.getElementById("status").textContent = "Interviewer is typing...";

    setTimeout(() => {
      const reply = responses[step] ?? "Thank you for your time! That concludes our mock interview. 🎉";
      addMessage(reply, "bot");
      step++;
      document.getElementById("status").textContent = "Interviewer is ready";
    }, 800);
  }

  function addMessage(text, type) {
    const msgs = document.getElementById("chatMessages");
    const div = document.createElement("div");
    div.className = `message ${type}`;
    div.textContent = text;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }
</script>

</body>
</html>
